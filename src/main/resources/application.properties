quarkus.http.port=8180

# Datasource
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/plataforma_cursos
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=postgres

# Hibernate ORM
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%prod.quarkus.hibernate-orm.schema-management.strategy=none
%dev.quarkus.hibernate-orm.log.sql=true
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:cursos
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.http.test-port=0

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.issuer=plataforma-cursos

quarkus.smallrye-jwt.enabled=true
